# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./CybersecurityChatbot_GUI # ✅ correct folder

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

     # ❌ REMOVED nuget restore (causes your error)
     
    - name: Build
      run: msbuild CybersecurityChatbot_GUI.csproj /p:Configuration=Release
   
    - name: Test
      run: echo "No tests configured"
