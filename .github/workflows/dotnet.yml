# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # Changed from ubuntu-latest to windows-latest to support .NET Framework 4.7.2
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Setup MSBuild, which is required for legacy .NET Framework projects
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore dependencies
      run: nuget restore CybersecurityChatbot_GUI.sln

    - name: Build
      run: msbuild CybersecurityChatbot_GUI.sln /p:Configuration=Release

    # Optional: Uncomment if you actually have automated tests in your solution
    # - name: Test
    #   run: vstest.console.exe .\**\bin\Release\*test*.dll
