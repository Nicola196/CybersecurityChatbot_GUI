name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  Solution_Name: CybersecurityChatbot_GUI.sln
  Test_Project_Path: CybersecurityChatbot_GUI.Tests/CybersecurityChatbot_GUI.Tests.csproj
  Wap_Project_Directory: CybersecurityChatbot_GUI.Package
  Wap_Project_Path: CybersecurityChatbot_GUI.Package/CybersecurityChatbot_GUI.Package.wapproj
  SHOULD_SIGN: 'false'
  Appx_Package_Build_Mode: StoreUpload
  Appx_Bundle: Always
  Appx_Bundle_Platforms: x86|x64

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Execute unit tests
      run: dotnet test "${{ env.Test_Project_Path }}"
      continue-on-error: true

    - name: Restore the application
      run: msbuild "${{ env.Solution_Name }}" /t:Restore /p:Configuration=${{ matrix.configuration }}

    - name: Decode the pfx
      if: env.SHOULD_SIGN == 'true'
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $certificatePath = Join-Path -Path "${{ env.Wap_Project_Directory }}" -ChildPath "GitHubActionsWorkflow.pfx"
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

    - name: Create the app package
      run: msbuild "${{ env.Wap_Project_Path }}" /p:Configuration=${{ matrix.configuration }} /p:UapAppxPackageBuildMode=${{ env.Appx_Package_Build_Mode }} /p:AppxBundle=${{ env.Appx_Bundle }} /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx /p:PackageCertificatePassword="${{ secrets.Pfx_Key }}"
      continue-on-error: true

    - name: Remove the pfx
      if: always()
      run: |
        $pfxPath = Join-Path -Path "${{ env.Wap_Project_Directory }}" -ChildPath "GitHubActionsWorkflow.pfx"
        if (Test-Path $pfxPath) { Remove-Item -Path $pfxPath -Force }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MSIX Package
        path: ${{ env.Wap_Project_Directory }}\AppPackages
      continue-on-error: true

