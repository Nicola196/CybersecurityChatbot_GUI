# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Setup MSBuild (Essential for legacy .NET Framework 4.7.2)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 2. Setup NuGet CLI
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 3. Restore dependencies using wildcards to find the project wherever it is nested
    - name: Restore dependencies
      run: nuget restore **/*.csproj

    # 4. Build the application using MSBuild (Not dotnet build)
    - name: Build the application
      run: msbuild **/*.csproj /p:Configuration=Release
